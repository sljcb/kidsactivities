<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KidVenture — Bay Area Kid-Friendly Places</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.4/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:#F7F8FA; color:#1A1A1A; max-width:430px; margin:0 auto; min-height:100vh; }
::-webkit-scrollbar { display:none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ===== MOCK DATA =====
const MOCK_VENUES = [
  {id:'1',name:'Bay Area Discovery Museum',city:'Sausalito',neighborhood:'Marin Headlands',category:'museum',venue_type:'both',rating:4.7,review_count:382,age_match_score:95,distance_mi:5.2,hours_today:'9:00 AM – 5:00 PM',age_note:'Perfect for ages 2–8 with dedicated toddler zones and outdoor exhibits',admission:{adult:16,child:16,under1:'Free'},parking_info:'Free lot',stroller_friendly:true,images:[]},
  {id:'2',name:'Golden Gate Park Playground',city:'San Francisco',neighborhood:'Inner Sunset',category:'playground',venue_type:'outdoor',rating:4.5,review_count:214,age_match_score:88,distance_mi:3.1,hours_today:'6:00 AM – 10:00 PM',age_note:'Multiple play structures for toddlers and older kids',admission:{adult:0,child:0},parking_info:'Street parking',stroller_friendly:true,images:[]},
  {id:'3',name:'Habitot Children\'s Museum',city:'Berkeley',neighborhood:'Downtown Berkeley',category:'museum',venue_type:'indoor',rating:4.4,review_count:156,age_match_score:92,distance_mi:8.7,hours_today:'9:30 AM – 4:30 PM',age_note:'Designed specifically for children 0–5, sensory-rich exhibits',admission:{adult:0,child:12,under1:'Free'},parking_info:'Paid garage nearby',stroller_friendly:true,images:[]},
  {id:'4',name:'Happy Hollow Park & Zoo',city:'San Jose',neighborhood:'Kelley Park',category:'farm',venue_type:'outdoor',rating:4.6,review_count:520,age_match_score:85,distance_mi:42.3,hours_today:'10:00 AM – 5:00 PM',age_note:'Petting zoo and rides ideal for ages 2–10',admission:{adult:17,child:15,under1:'Free'},parking_info:'Free lot',stroller_friendly:true,images:[]},
  {id:'5',name:'Pump It Up',city:'Mountain View',neighborhood:'North Bayshore',category:'indoor_play',venue_type:'indoor',rating:4.3,review_count:98,age_match_score:80,distance_mi:28.5,hours_today:'10:00 AM – 7:00 PM',age_note:'Inflatable bouncing paradise for ages 2–12',admission:{adult:0,child:14},parking_info:'Free lot',stroller_friendly:true,images:[]},
  {id:'6',name:'Seymour Marine Discovery Center',city:'Santa Cruz',neighborhood:'West Side',category:'science_center',venue_type:'both',rating:4.5,review_count:189,age_match_score:78,distance_mi:55.1,hours_today:'10:00 AM – 5:00 PM',age_note:'Hands-on marine science for ages 4+, whale skeleton!',admission:{adult:10,child:6,under1:'Free'},parking_info:'Free lot',stroller_friendly:true,images:[]},
  {id:'7',name:'Peekadoodle Kidsclub',city:'San Francisco',neighborhood:'SoMa',category:'indoor_play',venue_type:'indoor',rating:4.6,review_count:73,age_match_score:94,distance_mi:1.2,hours_today:'9:00 AM – 5:00 PM',age_note:'Premium indoor play for 0–5, clean and well-staffed',admission:{adult:0,child:20},parking_info:'Paid garage',stroller_friendly:true,images:[]},
  {id:'8',name:'Coyote Point Recreation Area',city:'San Mateo',neighborhood:'Coyote Point',category:'park',venue_type:'outdoor',rating:4.3,review_count:245,age_match_score:82,distance_mi:15.4,hours_today:'8:00 AM – Sunset',age_note:'Beach, playground, and CuriOdyssey science center in one spot',admission:{adult:6,child:0},parking_info:'$6 parking',stroller_friendly:true,images:[]},
];

const CATEGORY_ICONS = {museum:'🏛️',playground:'🛝',indoor_play:'🎡',park:'🌿',science_center:'🔬',swimming:'🏊',library:'📚',farm:'🌻',sports:'⛹️'};

// ===== COMPONENTS =====
function Header() {
  return (
    <div style={{background:'#fff',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid #F0F0F0'}}>
      <span style={{fontSize:18,fontWeight:700}}>🐣 KidVenture</span>
      <span style={{fontSize:12,color:'#999'}}>Bay Area</span>
    </div>
  );
}

function AgePicker({ value, onChange }) {
  const presets = [
    {label:'Baby',sub:'0–1 yr',months:6,icon:'🍼'},
    {label:'Toddler',sub:'2–3 yr',months:30,icon:'🐣'},
    {label:'Preschool',sub:'4–6 yr',months:60,icon:'🎨'},
    {label:'School Age',sub:'7–12 yr',months:108,icon:'🚴'},
  ];
  return (
    <div style={{marginBottom:12}}>
      <p style={{fontSize:13,color:'#666',marginBottom:8}}>Child's Age</p>
      <div style={{display:'flex',gap:8,overflowX:'auto'}}>
        {presets.map(p => {
          const active = value === p.months;
          return (
            <button key={p.months} onClick={() => onChange(p.months)} style={{
              flexShrink:0,width:80,height:76,borderRadius:12,border:'none',cursor:'pointer',
              display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
              background: active ? '#FF6B35' : '#F7F8FA',
              color: active ? '#fff' : '#666',
              transform: active ? 'scale(1.05)' : 'scale(1)',
              boxShadow: active ? '0 4px 12px rgba(255,107,53,0.3)' : 'none',
              transition:'all 0.2s',
            }}>
              <span style={{fontSize:22,marginBottom:2}}>{p.icon}</span>
              <span style={{fontSize:11,fontWeight:600}}>{p.label}</span>
              <span style={{fontSize:9,opacity:0.75}}>{p.sub}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function LocationPicker({ value, onChange }) {
  const regions = [
    {key:'',label:'All Bay Area'},{key:'sf',label:'San Francisco'},
    {key:'peninsula',label:'Peninsula'},{key:'south_bay',label:'South Bay'},
    {key:'east_bay',label:'East Bay'},{key:'north_bay',label:'North Bay'},
  ];
  return (
    <div>
      <p style={{fontSize:13,color:'#666',marginBottom:8}}>Location</p>
      <div style={{display:'flex',gap:6,overflowX:'auto'}}>
        {regions.map(r => {
          const active = value === r.key;
          return (
            <button key={r.key} onClick={() => onChange(r.key)} style={{
              flexShrink:0,padding:'6px 14px',borderRadius:20,border:'none',cursor:'pointer',
              fontSize:12,fontWeight:500,transition:'all 0.2s',
              background: active ? '#1890FF' : '#F7F8FA',
              color: active ? '#fff' : '#666',
            }}>
              {r.label}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function CategoryFilter({ value, onChange }) {
  const cats = [
    {key:'all',label:'All',icon:'✨'},{key:'playground',label:'Playground',icon:'🛝'},
    {key:'museum',label:'Museum',icon:'🏛️'},{key:'indoor_play',label:'Indoor Play',icon:'🎡'},
    {key:'park',label:'Park',icon:'🌿'},{key:'science_center',label:'Science',icon:'🔬'},
    {key:'farm',label:'Farm',icon:'🌻'},{key:'swimming',label:'Swimming',icon:'🏊'},
  ];
  return (
    <div style={{display:'flex',gap:6,overflowX:'auto',padding:'12px 16px',background:'#fff',marginTop:8,borderBottom:'1px solid #F0F0F0'}}>
      {cats.map(c => {
        const active = value === c.key;
        return (
          <button key={c.key} onClick={() => onChange(c.key)} style={{
            flexShrink:0,display:'flex',alignItems:'center',gap:4,padding:'6px 12px',
            borderRadius:20,border:'none',cursor:'pointer',fontSize:12,fontWeight:500,
            background: active ? '#FF6B35' : '#F7F8FA',
            color: active ? '#fff' : '#666',transition:'all 0.2s',
          }}>
            <span>{c.icon}</span><span>{c.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function MatchBadge({ score }) {
  let label, bg, color;
  if (score >= 90) { label='✅ Perfect fit'; bg='#dcfce7'; color='#15803d'; }
  else if (score >= 70) { label='👍 Good fit'; bg='#ffedd5'; color='#c2410c'; }
  else { label='⚠️ Okay fit'; bg='#fef9c3'; color='#a16207'; }
  return <span style={{fontSize:11,padding:'2px 8px',borderRadius:12,background:bg,color}}>{label}</span>;
}

function VenueCard({ venue }) {
  const [fav, setFav] = useState(false);
  const icon = CATEGORY_ICONS[venue.category] || '📍';
  const typeLabel = venue.venue_type === 'indoor' ? '🏠 Indoor' : venue.venue_type === 'outdoor' ? '🌳 Outdoor' : '🔄 Both';
  const childPrice = venue.admission?.child ?? '?';
  const priceText = childPrice === 0 ? 'Free' : `$${childPrice}/child`;

  return (
    <div style={{background:'#fff',borderRadius:14,overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,0.06)',marginBottom:12,cursor:'pointer',transition:'transform 0.1s'}}
      onMouseDown={e => e.currentTarget.style.transform='scale(0.98)'}
      onMouseUp={e => e.currentTarget.style.transform='scale(1)'}
      onMouseLeave={e => e.currentTarget.style.transform='scale(1)'}>
      {/* Image placeholder */}
      <div style={{position:'relative',width:'100%',height:150,background:'linear-gradient(135deg,#E8F0FE,#FFF0E8)',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <span style={{fontSize:48}}>{icon}</span>
        <button onClick={(e) => {e.stopPropagation(); setFav(!fav);}} style={{
          position:'absolute',top:10,right:10,width:32,height:32,borderRadius:16,border:'none',
          background:'#fff',cursor:'pointer',boxShadow:'0 2px 6px rgba(0,0,0,0.1)',
          display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,
        }}>
          {fav ? '🧡' : '🤍'}
        </button>
        <span style={{position:'absolute',top:10,left:10,fontSize:11,padding:'2px 8px',background:'rgba(255,255,255,0.9)',borderRadius:10,color:'#666'}}>
          {typeLabel}
        </span>
      </div>
      {/* Content */}
      <div style={{padding:12}}>
        <h3 style={{fontSize:16,fontWeight:600,marginBottom:8}}>{venue.name}</h3>
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8,flexWrap:'wrap'}}>
          <span style={{fontSize:11,padding:'2px 8px',borderRadius:12,background:'#F0F5FF',color:'#2F54EB',textTransform:'capitalize'}}>
            {(venue.category||'').replace('_',' ')}
          </span>
          <MatchBadge score={venue.age_match_score} />
          <span style={{marginLeft:'auto',fontSize:12,color:'#666'}}>
            ⭐ {venue.rating} <span style={{color:'#999'}}>({venue.review_count})</span>
          </span>
        </div>
        <div style={{fontSize:12,color:'#999',marginBottom:4}}>
          📍 {venue.neighborhood}, {venue.city} · {venue.distance_mi} mi
        </div>
        <div style={{fontSize:12,color:'#52C41A',marginBottom:4}}>
          🕐 {venue.hours_today}
        </div>
        <div style={{fontSize:12,color:'#666',marginBottom:6,lineHeight:1.5}}>
          👶 {venue.age_note}
        </div>
        <div style={{display:'flex',gap:12,fontSize:11,color:'#999'}}>
          <span>🎫 {priceText}</span>
          {venue.parking_info && <span>🅿️ {venue.parking_info}</span>}
          {venue.stroller_friendly && <span>👶 Stroller OK</span>}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [age, setAge] = useState(30);
  const [region, setRegion] = useState('');
  const [category, setCategory] = useState('all');

  const filtered = MOCK_VENUES.filter(v => {
    if (region && !['',undefined].includes(region)) {
      const regionMap = {sf:['San Francisco'],peninsula:['San Mateo'],south_bay:['San Jose','Mountain View','Santa Cruz'],east_bay:['Berkeley'],north_bay:['Sausalito']};
      const cities = regionMap[region] || [];
      if (cities.length && !cities.includes(v.city)) return false;
    }
    if (category !== 'all' && v.category !== category) return false;
    return true;
  }).sort((a,b) => b.age_match_score - a.age_match_score);

  return (
    <div>
      <Header />
      <div style={{background:'#fff',padding:'16px 16px 12px'}}>
        <AgePicker value={age} onChange={setAge} />
        <LocationPicker value={region} onChange={setRegion} />
      </div>
      <CategoryFilter value={category} onChange={setCategory} />
      <div style={{padding:16}}>
        <p style={{fontSize:12,color:'#999',marginBottom:12}}>{filtered.length} places found</p>
        {filtered.map(v => <VenueCard key={v.id} venue={v} />)}
        {filtered.length === 0 && (
          <div style={{textAlign:'center',padding:'60px 0'}}>
            <span style={{fontSize:48}}>🐻</span>
            <p style={{color:'#666',fontSize:14,marginTop:12}}>No matches found</p>
            <p style={{color:'#999',fontSize:12,marginTop:4}}>Try a different area or age group?</p>
          </div>
        )}
        {filtered.length > 0 && (
          <p style={{textAlign:'center',fontSize:12,color:'#999',padding:'16px 0'}}>— That's all! —</p>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
